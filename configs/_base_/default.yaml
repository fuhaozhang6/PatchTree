# PatchTree default configuration — base for all environments.
# Environment configs should inherit via: _base_: default.yaml

model:
  backend: azure_openai
  optimizer: gpt-5.5
  target: gpt-5.5
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: medium
  codex_exec_path: codex
  codex_exec_sandbox: workspace-write
  codex_exec_profile: ""
  codex_exec_full_auto: false
  codex_exec_reasoning_effort: none
  codex_exec_use_sdk: auto
  codex_exec_network_access: false
  codex_exec_web_search: false
  codex_exec_approval_policy: never
  claude_code_exec_path: claude
  claude_code_exec_profile: ""
  claude_code_exec_use_sdk: auto
  claude_code_exec_effort: medium
  claude_code_exec_max_thinking_tokens: 16384
  codex_trace_to_optimizer: true
  azure_openai_endpoint: ""           # e.g. "https://your-resource.openai.azure.com/"
  azure_openai_api_version: "2024-12-01-preview"
  azure_openai_api_key: ""       # Fill locally if you do not export AZURE_OPENAI_API_KEY
  azure_openai_auth_mode: ""           # empty → fall back to AZURE_OPENAI_AUTH_MODE env (default "azure_cli")
  azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  azure_openai_managed_identity_client_id: ""
  optimizer_azure_openai_endpoint: ""   # e.g. "https://your-resource.openai.azure.com/"
  optimizer_azure_openai_api_version: "2024-12-01-preview"
  optimizer_azure_openai_api_key: ""
  optimizer_azure_openai_auth_mode: ""           # empty → fall back to OPTIMIZER_AZURE_OPENAI_AUTH_MODE env, then shared
  optimizer_azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  optimizer_azure_openai_managed_identity_client_id: ""
  target_azure_openai_endpoint: ""   # e.g. "https://your-resource.openai.azure.com/"
  target_azure_openai_api_version: "2024-12-01-preview"
  target_azure_openai_api_key: ""
  target_azure_openai_auth_mode: ""           # empty → fall back to TARGET_AZURE_OPENAI_AUTH_MODE env, then shared
  target_azure_openai_ad_scope: "https://cognitiveservices.azure.com/.default"
  target_azure_openai_managed_identity_client_id: ""

  # MiniMax backend settings (minimax_chat target)
  minimax_base_url: ""          # https://api.minimax.io/v1 if blank
  minimax_api_key: ""
  minimax_model: "MiniMax-M2.7"
  minimax_temperature: "0.7"
  minimax_max_tokens: "8000"
  minimax_enable_thinking: "false"

train:
  num_epochs: 4
  train_size: 0          # 0 = derive from dataset split when available
  batch_size: 40
  accumulation: 1
  seed: 42

gradient:
  analyst_workers: 16

optimizer:
  learning_rate: 999        # node-internal edit cap; intentionally non-binding by default
  min_learning_rate: 999    # keep the cap non-binding for every optimization step
  lr_scheduler: constant    # node count, not edit count, is the default structural budget
  lr_control_mode: fixed    # fixed / autonomous / none
  type_guided_min_support: 2  # set 1 to admit singleton leaves; with 2 they can enter tail bank
  type_guided_max_leaf_groups: 8
  type_guided_tree_depth: 2   # 1 = records -> root; 2 = leaf -> root; 3 = leaf -> mid -> root
  type_guided_tree_builder: recursive  # recursive / fixed
  type_guided_max_tree_depth: 4  # hard cap including the leaf level and executable root
  type_guided_merge_target_children: 3
  type_guided_merge_max_children: 4
  type_guided_merge_strategy: hierarchical  # hierarchical / concat / flat_fuse
  type_guided_grouping_mode: type  # type / random / success_then_type
  type_guided_grouping_seed: -1  # -1 = reuse train.seed
  type_guided_top_mode: auto  # auto / real_root / virtual_root / conservative_root
  type_guided_fallback_enabled: true
  type_guided_fallback_max_hops: -1  # -1 = unlimited; 0 = root only; 1 = direct children
  type_guided_fallback_allow_leaf: true
  type_guided_rollout_repeats: 3
  type_guided_tau_succ: 1.0
  type_guided_max_patch_records: 24
  type_guided_fallback_eval_all_leaves: true
  type_guided_fallback_top_k: 0
  type_guided_fallback_tau_child: 0.0
  type_guided_fallback_min_leaf_coverage: 1
  type_guided_validation_budget: 16  # fallback node evaluations; final joint validation is separate
  type_guided_fallback_sel_env_num: 0  # >0 = fixed-seed random subset; 0 = full selection split
  type_guided_fallback_reconcile: llm_fuse  # off / deterministic / llm_select / llm_fuse
  type_guided_fallback_reconcile_min_children: 2
  type_guided_cache_dir: ""
  type_guided_patch_record_workers: 0
  type_guided_clustering: false  # optional global LLM clustering; enable explicitly per run
  type_guided_cluster_target_size: 6
  type_guided_cluster_max_size: 10
  type_guided_leaf_merge_workers: 4
  type_guided_mid_merge_workers: 4
  type_guided_tail_bank: true   # epoch-end slow update for unadopted low-support records
  type_guided_tail_min_support: 2
  type_guided_tail_max_records: 32
  type_guided_tail_max_leaf_groups: 4
  type_guided_tail_window_epochs: 1
  type_guided_tail_require_cross_step: true

evaluation:
  use_gate: true
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

env:
  name: ""
  skill_init: ""
  split_mode: ratio       # ratio = build deterministic split from data_path; split_dir = use pre-split train/val/test
  split_seed: 42
  split_dir: ""
  data_path: ""
  split_output_dir: ""
  exec_timeout: 120      # per target model/code-agent call timeout in seconds
  out_root: ""
